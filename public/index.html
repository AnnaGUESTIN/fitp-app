<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FITP — Hospitality Experiences</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --sidebar-w: 230px; --sidebar-bg: #0f2a5e; --body-bg: #081629;
  --accent: #c9a235; --green: #007a3d; --text: #fff; --text-dim: rgba(255,255,255,0.6);
}
html, body { height: 100%; font-family: 'Montserrat', sans-serif; background: var(--body-bg); color: var(--text); overflow: hidden; }
.app { display: flex; height: 100vh; overflow: hidden; }

/* SIDEBAR */
.sidebar { width: var(--sidebar-w); background: var(--sidebar-bg); display: flex; flex-direction: column; padding: 28px 18px; flex-shrink: 0; z-index: 50; border-right: 1px solid rgba(255,255,255,0.06); }
.sidebar-logo { width: 130px; margin-bottom: 32px; flex-shrink: 0; }
.sidebar-logo svg { width: 100%; display: block; }
.nav { list-style: none; display: flex; flex-direction: column; gap: 6px; }
.nav-item { display: flex; align-items: center; gap: 11px; padding: 11px 14px; border-radius: 9px; border: 1.5px solid transparent; cursor: pointer; color: rgba(255,255,255,0.65); font-size: 13px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; transition: all .2s; user-select: none; }
.nav-item svg { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
.nav-item:hover { color: #fff; background: rgba(255,255,255,0.07); }
.nav-item.active { color: #fff; border-color: rgba(255,255,255,0.35); }
.sidebar-footer { margin-top: auto; }
.brand-name { font-family: 'Bebas Neue', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: 0.04em; }
.brand-tag { font-size: 10px; color: rgba(255,255,255,0.38); letter-spacing: 0.12em; margin-top: 2px; }

/* MAIN */
.main { flex: 1; overflow-y: auto; overflow-x: hidden; position: relative; scrollbar-width: none; }
.main::-webkit-scrollbar { display: none; }

/* TOPBAR */
.topbar { position: absolute; top: 0; right: 0; padding: 22px 32px; display: flex; gap: 10px; z-index: 20; }
.topbar-btn { width: 42px; height: 42px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.28); background: rgba(0,0,0,0.25); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; transition: all .2s; }
.topbar-btn:hover { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.5); }
.topbar-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

/* HERO */
.hero { position: relative; height: 440px; overflow: hidden; cursor: pointer; }
.hero-img { position: absolute; inset: 0; background-size: cover; background-position: center 70%; transition: transform .6s ease; }
.hero:hover .hero-img { transform: scale(1.02); }
.hero-fade-left { position: absolute; inset: 0; background: linear-gradient(to right, rgba(8,22,41,0.92) 0%, rgba(8,22,41,0.55) 45%, rgba(8,22,41,0) 75%); }
.hero-fade-bottom { position: absolute; inset: 0; background: linear-gradient(to top, var(--body-bg) 0%, transparent 40%); }
.hero-content { position: relative; z-index: 3; height: 100%; display: flex; flex-direction: column; justify-content: flex-end; padding: 0 48px 44px; max-width: 540px; }
.hero-tag { display: inline-flex; align-items: center; gap: 6px; background: var(--accent); color: #fff; font-size: 10px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; padding: 4px 10px; border-radius: 4px; margin-bottom: 12px; align-self: flex-start; }
.hero-title { font-family: 'Bebas Neue', sans-serif; font-size: 68px; font-weight: 900; text-transform: uppercase; line-height: 0.92; margin-bottom: 16px; text-shadow: 0 2px 12px rgba(0,0,0,0.5); }
.hero-desc { font-size: 13.5px; color: rgba(255,255,255,0.8); line-height: 1.55; margin-bottom: 26px; max-width: 380px; }
.hero-btn { display: inline-flex; align-items: center; gap: 8px; padding: 11px 22px; border-radius: 9px; border: 1.5px solid rgba(255,255,255,0.42); background: rgba(255,255,255,0.1); backdrop-filter: blur(6px); color: #fff; font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; align-self: flex-start; transition: all .2s; }
.hero-btn:hover { background: rgba(255,255,255,0.22); border-color: rgba(255,255,255,0.7); }
.hero-btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

/* SECTION */
.section { padding: 0 48px 40px; background: var(--body-bg); }
.section-title { font-size: 21px; font-weight: 600; margin-bottom: 20px; }
.carousel-wrap { position: relative; }
.carousel { display: flex; gap: 14px; overflow-x: auto; scroll-behavior: smooth; scrollbar-width: none; padding-bottom: 4px; }
.carousel::-webkit-scrollbar { display: none; }
.carousel-arrow { position: absolute; right: -24px; top: 50%; transform: translateY(-50%); width: 44px; height: 44px; border-radius: 50%; background: rgba(8,22,41,0.9); border: 1.5px solid rgba(255,255,255,0.22); display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; font-size: 22px; z-index: 10; transition: all .2s; user-select: none; }
.carousel-arrow:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.45); }

/* CARD */
.card { flex: 0 0 215px; height: 215px; border-radius: 12px; overflow: hidden; cursor: pointer; position: relative; transition: transform .22s ease; }
.card:hover { transform: scale(1.04); z-index: 5; }
.card-img { position: absolute; inset: 0; background-size: cover; background-position: center; transition: transform .3s ease; }
.card:hover .card-img { transform: scale(1.06); }
.card-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 30%, rgba(0,0,0,0.82) 100%); }
.card-badge { position: absolute; top: 11px; left: 11px; background: #fff; color: #000; font-size: 10px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; }
.card-body { position: absolute; bottom: 0; left: 0; right: 0; padding: 10px 14px 14px; }
.card-name { font-family: 'Bebas Neue', sans-serif; font-size: 24px; font-weight: 800; text-transform: uppercase; line-height: 1.1; text-shadow: 0 1px 6px rgba(0,0,0,0.5); }
.card-link { display: block; font-size: 10.5px; letter-spacing: 0.06em; text-transform: uppercase; color: rgba(255,255,255,0.6); margin-top: 5px; }

/* MODAL */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 24px; opacity: 0; visibility: hidden; transition: opacity .28s, visibility .28s; }
.overlay.open { opacity: 1; visibility: visible; }
.modal { background: #080f1e; border-radius: 14px; overflow: hidden; width: 100%; max-width: 520px; max-height: 92vh; overflow-y: auto; scrollbar-width: none; position: relative; transform: scale(0.94) translateY(10px); transition: transform .28s ease; border: 1px solid rgba(255,255,255,0.08); }
.modal::-webkit-scrollbar { display: none; }
.overlay.open .modal { transform: scale(1) translateY(0); }
.modal-img { width: 100%; height: 280px; background-size: cover; background-position: center; }
.modal-close { position: absolute; top: 10px; right: 10px; width: 34px; height: 34px; border-radius: 50%; background: rgba(0,0,0,0.6); border: 2px solid rgba(255,255,255,0.5); display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; font-size: 14px; font-weight: 700; z-index: 10; transition: all .2s; line-height: 1; }
.modal-close:hover { background: rgba(255,255,255,0.18); }
.modal-body { padding: 22px 30px 28px; text-align: center; }
.modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 42px; font-weight: 900; text-transform: uppercase; line-height: 0.95; margin-bottom: 10px; }
.modal-desc { font-size: 12.5px; line-height: 1.55; color: rgba(255,255,255,0.75); margin-bottom: 20px; max-width: 460px; margin-left: auto; margin-right: auto; }
.modal-details { display: flex; justify-content: center; gap: 0; margin-bottom: 22px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 16px 10px; }
.detail-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 0 10px; border-right: 1px solid rgba(255,255,255,0.1); }
.detail-item:last-child { border-right: none; }
.detail-label { font-size: 9px; font-weight: 700; letter-spacing: 0.14em; color: rgba(255,255,255,0.35); text-transform: uppercase; }
.detail-value { font-size: 13px; font-weight: 700; color: #fff; }
.modal-footer { display: flex; justify-content: center; align-items: center; gap: 14px; }
.btn-pax { padding: 13px 26px; border-radius: 10px; border: 2px solid var(--accent); background: transparent; color: #fff; font-family: 'Montserrat', sans-serif; font-size: 17px; font-weight: 700; cursor: pointer; transition: background .2s; }
.btn-pax:hover { background: rgba(204,32,39,0.15); }
.btn-cta { margin-left: auto; padding: 13px 44px; border-radius: 10px; border: none; background: var(--accent); color: #fff; font-family: 'Montserrat', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; transition: background .2s; }
.btn-cta:hover { background: #e0262e; }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <!-- FITP Logo -->
    <div class="sidebar-logo">
      <img src="https://www.ibiaccommodation.com/static/images/logo-fit.png" alt="FITP" style="width:100%; display:block;">
    </div>

    <nav>
      <ul class="nav">
        <li class="nav-item active" onclick="setNav(this)">
          <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          HOME
        </li>
        <li class="nav-item" onclick="setNav(this)">
          <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          MY EXPERIENCES
        </li>
        <li class="nav-item" onclick="setNav(this)">
          <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          GUESTS
        </li>
      </ul>
    </nav>

    <div class="sidebar-footer">
      <div class="brand-name">GUESTIN</div>
      <div class="brand-tag">Beyond the experience</div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="topbar-btn" title="Help">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      </div>
      <div class="topbar-btn" title="Profile">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
    </div>

    <section class="hero" id="hero">
      <div class="hero-img" id="heroImg"></div>
      <div class="hero-fade-left"></div>
      <div class="hero-fade-bottom"></div>
      <div class="hero-content">
        <div class="hero-tag">⭐ Featured experience</div>
        <h1 class="hero-title" id="heroTitle">&nbsp;</h1>
        <p class="hero-desc" id="heroDesc"></p>
        <button class="hero-btn" id="heroBtn">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          VIEW DETAILS
        </button>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">Experiences not to be missed</h2>
      <div class="carousel-wrap">
        <div class="carousel" id="carousel"></div>
        <div class="carousel-arrow" id="carouselArrow">›</div>
      </div>
    </section>
  </main>
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <div class="modal-img" id="modalImg"></div>
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-body">
      <h2 class="modal-title" id="modalTitle"></h2>
      <p class="modal-desc" id="modalDesc"></p>
      <div class="modal-details" id="modalDetails"></div>
      <div class="modal-footer">
        <button class="btn-cta">I WANT THIS</button>
      </div>
    </div>
  </div>
</div>

<script>
let EVENTS = [], scrollPos = 0;

async function loadExperiences() {
  const { data } = await fetch('/api/experiences/public').then(r => r.json());
  EVENTS = data;
  renderHero(); renderCards();
}

function renderHero() {
  const hero = EVENTS.find(e => e.is_hero) || EVENTS[0];
  if (!hero) return;
  document.getElementById('heroImg').style.backgroundImage = `url('${hero.hero_img}')`;
  document.getElementById('heroTitle').innerHTML = hero.title.replace(' ', '<br>');
  document.getElementById('heroDesc').textContent = hero.description;
  document.getElementById('heroBtn').onclick = e => { e.stopPropagation(); openModal(hero); };
  document.getElementById('hero').onclick = () => openModal(hero);
}

function renderCards() {
  const c = document.getElementById('carousel');
  c.innerHTML = '';
  EVENTS.forEach(ev => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-img" style="background-image:url('${ev.card_img}')"></div>
      <div class="card-overlay"></div>
      <div class="card-badge">AVAILABLE ${ev.pax} pax.</div>
      <div class="card-body">
        <div class="card-name">${ev.title}</div>
        <span class="card-link">VIEW DETAILS</span>
      </div>`;
    card.addEventListener('click', () => openModal(ev));
    c.appendChild(card);
  });
}

function openModal(ev) {
  document.getElementById('modalTitle').textContent = ev.title;
  document.getElementById('modalDesc').textContent = ev.description;
  const imgUrl = ev.card_img || ev.img1 || '';
  document.getElementById('modalImg').style.backgroundImage = imgUrl ? `url('${imgUrl}')` : 'none';
  document.getElementById('modalDetails').innerHTML = `
    <div class="detail-item"><span class="detail-label">VENUE</span><span class="detail-value">${ev.lugar || '—'}</span></div>
    <div class="detail-item"><span class="detail-label">TIME</span><span class="detail-value">${ev.hora || '—'}</span></div>
    <div class="detail-item"><span class="detail-label">DURATION</span><span class="detail-value">${ev.duracion || '—'}</span></div>
    <div class="detail-item"><span class="detail-label">PAX</span><span class="detail-value">${ev.pax || '—'}</span></div>`;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  document.getElementById('modal').scrollTop = 0;
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); document.body.style.overflow = ''; }
document.getElementById('overlay').addEventListener('click', e => { if (e.target===document.getElementById('overlay')) closeModal(); });
document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });
document.getElementById('carouselArrow').addEventListener('click', () => {
  const c = document.getElementById('carousel'), max = c.scrollWidth - c.clientWidth;
  scrollPos = scrollPos >= max - 10 ? 0 : Math.min(scrollPos + 460, max);
  c.scrollTo({ left: scrollPos, behavior: 'smooth' });
});
function setNav(el) { document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); }
loadExperiences();
</script>
</body>
</html>
